<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" opacity="0.14">
  <!-- Rings -->
  <g stroke="#c9a84c" fill="none">
    <circle cx="250" cy="250" r="237" stroke-width="2.5"/>
    <circle cx="250" cy="250" r="200" stroke-width="1"/>
    <circle cx="250" cy="250" r="128" stroke-width="1"/>
    <!-- 8 spokes -->
    <line x1="250" y1="13"  x2="250" y2="487" stroke-width="0.8"/>
    <line x1="13"  y1="250" x2="487" y2="250" stroke-width="0.8"/>
    <line x1="83"  y1="83"  x2="417" y2="417" stroke-width="0.8"/>
    <line x1="417" y1="83"  x2="83"  y2="417" stroke-width="0.8"/>
    <!-- Yin-yang outer ring -->
    <circle cx="250" cy="250" r="62" stroke-width="2"/>
    <!-- Yin-yang S-curve -->
    <path d="M250,188 A31,31 0 0,1 250,250 A31,31 0 0,0 250,312" stroke-width="1.8"/>
    <!-- Small fish-eye circles -->
    <circle cx="250" cy="219" r="10" stroke-width="1.5"/>
    <circle cx="250" cy="281" r="10" stroke-width="1.5"/>
  </g>

  <!-- 後天八卦 trigrams (Later Heaven arrangement, South at top) -->
  <!-- Trigram radius ≈ 168 from center -->
  <g fill="#c9a84c" stroke="none"
     font-family="'Segoe UI Symbol','Apple Symbols','Symbola',serif"
     font-size="36" text-anchor="middle" dominant-baseline="central">
    <text x="250" y="68">☲</text>   <!-- 南 South  Li   Fire    -->
    <text x="369" y="131">☷</text>  <!-- 坤 SW     Kun  Earth   -->
    <text x="418" y="250">☱</text>  <!-- 西 West   Dui  Lake    -->
    <text x="369" y="369">☰</text>  <!-- 乾 NW     Qian Heaven  -->
    <text x="250" y="432">☵</text>  <!-- 北 North  Kan  Water   -->
    <text x="131" y="369">☶</text>  <!-- 艮 NE     Gen  Mountain-->
    <text x="82"  y="250">☳</text>  <!-- 東 East   Zhen Thunder -->
    <text x="131" y="131">☴</text>  <!-- 巽 SE     Xun  Wind    -->
  </g>

  <!-- Direction labels -->
  <g fill="#c9a84c" stroke="none"
     font-family="'Noto Serif SC','Segoe UI','Microsoft YaHei',sans-serif"
     font-size="13" text-anchor="middle" dominant-baseline="central">
    <text x="250" y="150">南</text>
    <text x="250" y="350">北</text>
    <text x="150" y="250">東</text>
    <text x="352" y="250">西</text>
  </g>
</svg>
