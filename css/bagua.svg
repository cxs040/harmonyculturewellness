<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" opacity="0.09">
  <g fill="none" stroke="#c9a84c">
    <!-- Outer decorative rings -->
    <circle cx="200" cy="200" r="192" stroke-width="2.5"/>
    <circle cx="200" cy="200" r="176" stroke-width="0.6"/>
    <circle cx="200" cy="200" r="152" stroke-width="1.2"/>
    <circle cx="200" cy="200" r="108" stroke-width="0.8"/>

    <!-- 8 spokes dividing the ring zones -->
    <line x1="200" y1="8"   x2="200" y2="392" stroke-width="0.4"/>
    <line x1="8"   y1="200" x2="392" y2="200" stroke-width="0.4"/>
    <line x1="57"  y1="57"  x2="343" y2="343" stroke-width="0.4"/>
    <line x1="343" y1="57"  x2="57"  y2="343" stroke-width="0.4"/>

    <!-- Yin-Yang outer border -->
    <circle cx="200" cy="200" r="54" stroke-width="1.5"/>
  </g>

  <!-- Yin-Yang shape -->
  <g>
    <!-- Light half (gold) -->
    <path d="M200,146 A54,54 0 0,1 200,254 A27,27 0 0,1 200,200 A27,27 0 0,0 200,146 Z" fill="#c9a84c" opacity="0.09"/>
    <!-- Small dot: light in dark -->
    <circle cx="200" cy="173" r="9" fill="#c9a84c" opacity="0.09"/>
    <!-- Small dot: dark in light -->
    <circle cx="200" cy="227" r="9" fill="#18140e" opacity="0.09"/>
    <!-- Outline -->
    <path d="M200,146 A54,54 0 0,1 200,254 A27,27 0 0,1 200,200 A27,27 0 0,0 200,146 Z" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.09"/>
  </g>

  <!-- 後天八卦 trigram symbols -->
  <g fill="#c9a84c" opacity="0.09" font-family="serif" text-anchor="middle" font-size="32">
    <!-- S/top: ☲ Li Fire -->
    <text x="200" y="44">☲</text>
    <!-- SE: ☴ Xun Wind -->
    <text x="300" y="76">☴</text>
    <!-- E/right: ☱ Dui Lake (later heaven: W=Dui, E=Zhen) -->
    <text x="344" y="212">☱</text>
    <!-- NE: ☰ Qian Heaven -->
    <text x="300" y="344">☰</text>
    <!-- N/bottom: ☵ Kan Water -->
    <text x="200" y="374">☵</text>
    <!-- NW: ☶ Gen Mountain -->
    <text x="102" y="344">☶</text>
    <!-- W/left: ☳ Zhen Thunder -->
    <text x="58" y="212">☳</text>
    <!-- SW: ☷ Kun Earth -->
    <text x="102" y="76">☷</text>
  </g>

  <!-- Chinese cardinal labels (tiny) -->
  <g fill="#c9a84c" opacity="0.09" font-family="serif" text-anchor="middle" font-size="11">
    <text x="200" y="132">南</text>
    <text x="200" y="280">北</text>
    <text x="132" y="205">西</text>
    <text x="270" y="205">東</text>
  </g>
</svg>
